name: Vibe Review Dispatch

on:
  pull_request:
    types: [opened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR 번호 (수동 실행 시)'
        required: true
        type: number

permissions:
  contents: write
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dispatch-review:
    name: "review-{N}.md 배포"
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch review task files
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // pull_request 이벤트 또는 workflow_dispatch 수동 실행 모두 지원
            let headBranch, prNumber, prTitle;
            if (context.eventName === 'workflow_dispatch') {
              const prNum = parseInt(context.payload.inputs.pr_number, 10);
              const prData = await github.rest.pulls.get({ owner, repo, pull_number: prNum });
              headBranch = prData.data.head.ref;
              prNumber = prData.data.number;
              prTitle = prData.data.title;
            } else {
              headBranch = context.payload.pull_request.head.ref;
              prNumber = context.payload.pull_request.number;
              prTitle = context.payload.pull_request.title;
            }

            // vibe/* 브랜치만 처리
            const branchMatch = headBranch.match(/^vibe\/([^\/]+)\/.+-(\d+)$/);
            if (!branchMatch) {
              console.log(`[건너뜀] vibe/* 패턴 불일치: ${headBranch}`);
              return;
            }

            const authorModel = branchMatch[1];
            const issueNumber = branchMatch[2];

            console.log(`[시작] PR #${prNumber}, 모델: ${authorModel}, 이슈: #${issueNumber}`);

            // vibe-models.json 읽기 (필수 — 실패 시 중단)
            let config, allModels;
            try {
              const configRes = await github.rest.repos.getContent({
                owner, repo,
                path: '.github/vibe-models.json',
                ref: 'main'
              });
              config = JSON.parse(Buffer.from(configRes.data.content, 'base64').toString());
              allModels = Object.keys(config.models);
            } catch (e) {
              core.setFailed(`[실패] vibe-models.json 읽기 실패: ${e.message}`);
              return;
            }

            // review-task.md 템플릿 읽기 (필수 — 실패 시 중단)
            let template;
            try {
              const templateRes = await github.rest.repos.getContent({
                owner, repo,
                path: '.claude/skills/vibe-eval/templates/review-task.md',
                ref: 'main'
              });
              template = Buffer.from(templateRes.data.content, 'base64').toString();
            } catch (e) {
              core.setFailed(`[실패] review-task.md 템플릿 읽기 실패: ${e.message}`);
              return;
            }

            // issueTitle: PR 제목에서 [모델명] 접두사 제거
            const issueTitle = prTitle.replace(/^\[[^\]]+\]\s*/, '').replace(/\s*#\d+$/, '').trim();

            // vibe-projects.json 읽기 (루프 밖 — 1회만, 필수 — 실패 시 중단)
            let projects = {};
            try {
              const projectsRes = await github.rest.repos.getContent({
                owner, repo,
                path: '.github/vibe-projects.json',
                ref: 'main'
              });
              projects = JSON.parse(Buffer.from(projectsRes.data.content, 'base64').toString()).projects;
            } catch(e) {
              core.setFailed(`[실패] vibe-projects.json 읽기 실패: ${e.message}`);
              return;
            }

            // 참여 모델 목록: issue-{N}.md가 존재하는 모델 브랜치 파악
            const participatingModels = [];
            for (const modelKey of allModels) {
              if (modelKey === authorModel) continue;
              const model = config.models[modelKey];

              let foundTaskFile = false;
              let foundTargetDir = '';

              for (const [, proj] of Object.entries(projects)) {
                try {
                  await github.rest.repos.getContent({
                    owner, repo,
                    path: `task/${proj.folder}/issue-${issueNumber}.md`,
                    ref: model.base_branch
                  });
                  foundTaskFile = true;
                  foundTargetDir = proj.folder;
                  break;
                } catch(e) {
                  if (e.status !== 404) console.log(`[경고] ${modelKey}/${proj.folder} 파일 조회 실패: ${e.message}`);
                  /* 없으면 다음 프로젝트 */
                }
              }

              if (foundTaskFile) {
                participatingModels.push({ modelKey, model, targetDir: foundTargetDir });
              } else {
                console.log(`[건너뜀] ${modelKey}: issue-${issueNumber}.md 없음 (미참여 모델)`);
              }
            }

            if (participatingModels.length === 0) {
              console.log('[완료] 리뷰 파일을 배포할 참여 모델 없음');
              return;
            }

            // 각 참여 모델 브랜치에 review-{N}.md push
            const prAuthorDisplayName = config.models[authorModel]?.display_name || authorModel;
            let pushFailed = false;

            for (const { modelKey, model, targetDir } of participatingModels) {
              const filePath = `task/${targetDir}/review-${issueNumber}.md`;
              const content = template
                .replace(/{TITLE}/g, issueTitle)
                .replace(/{ISSUE_NUMBER}/g, issueNumber)
                .replace(/{PR_NUMBER}/g, String(prNumber))
                .replace(/{PR_AUTHOR_MODEL}/g, prAuthorDisplayName)
                .replace(/{OWNER}/g, owner)
                .replace(/{REPO}/g, repo)
                .replace(/{MODEL}/g, model.base_branch)
                .replace(/{TARGET_DIR}/g, targetDir);

              const encodedContent = Buffer.from(content).toString('base64');

              // 기존 파일 SHA 조회 (덮어쓰기용)
              let sha = undefined;
              try {
                const existing = await github.rest.repos.getContent({
                  owner, repo,
                  path: filePath,
                  ref: model.base_branch
                });
                sha = existing.data.sha;
              } catch(e) {
                if (e.status !== 404) console.log(`[경고] SHA 조회 실패 (${modelKey}): ${e.message}`);
                /* 신규 파일 또는 조회 불가 — sha 없이 진행 */
              }

              try {
                await github.rest.repos.createOrUpdateFileContents({
                  owner, repo,
                  path: filePath,
                  message: `chore: add review-${issueNumber} task file [skip ci]`,
                  content: encodedContent,
                  branch: model.base_branch,
                  ...(sha ? { sha } : {})
                });
                console.log(`[완료] ${modelKey} 브랜치 → ${filePath}`);
              } catch(e) {
                core.warning(`[실패] ${modelKey} 브랜치 push 실패: ${e.message}`);
                pushFailed = true;
              }
            }

            if (pushFailed) {
              core.setFailed('하나 이상의 모델 브랜치에 review 파일 push 실패');
            }
