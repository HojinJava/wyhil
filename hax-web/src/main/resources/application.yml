# DataBase
spring:
  session:
    store-type: jdbc
    jdbc:
      initialize-schema: never
    timeout: 60m
  main:
    allow-circular-references: true
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  messages:
    basename: i18n/messages
    encoding: UTF-8

  ## 메일 설정
  mail:
    host: smtp.office365.com # smtp.gmail.com # exm
    port: 587 #25
    username: HiDRMNotification@hncorp.world
    password: roqkfxla-1
    properties:
      mail:
        smtp:
          starttls:
            enable: true
            required: false
          auth: true
          timeout: 300000
        mime:
          charset: UTF-8
        transport:
          protocol: smtp

  profiles:
    active: local

mybatis:
  config-location: classpath:mybatis-config.xml
  mapper-locations: classpath*:/mapper/**/*.xml

springdoc:
  version: 1.0

#내장 톰켓 설정
server:
  port: 8080
  servlet:
    context-path: /hax-web
    session:
      timeout: 3600 #300 5분, 3600 60분
    encoding:
      charset: UTF-8
      enabled: true
      force: true

logging:
  config: classpath:config/logs/logback-spring.xml
  level:
    root: INFO ##
    org.hibernate:
      type:
        descriptor.sql: info

management:
  endpoints:
    web:
      exposure:
        include: health, metrics
