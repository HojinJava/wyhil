    hikari:
      connection-timeout: 5000
      validation-timeout: 1000
      maximum-pool-size: 30
      minimum-idle: 5
      auto-commit: false

springdoc:
  swagger-ui:
    enabled: false

hnix:
  utils:
    file:
      location: /root/Files
      max-file-size: 20480000
      file-white-list: jpg,png,jpeg,ppt,doc,pdf,hwp,xls,zip,xlsx,pptx,txt,docx
      buffer-size: 1048576
  user:
    consent-temp-days: 30
    consent-use-days: 1825
    consent-open-day: 2026-01-12

mail:
  survey:
    redirect-url: https://hax-web.hnix.co.kr/#/pages/survey
  certificate:
    redirect-url: https://hax-web.hnix.co.kr/#/pages/certificate

  login-url: https://hax-web.hnix.co.kr/#/login
  privacy-url: https://hax-web.hnix.co.kr/#/privacy

schedule:
  cron: 0 0 18 * * *
  use: true
